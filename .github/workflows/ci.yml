name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Forge tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fluid-compliance

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv

  lint:
    name: Solhint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fluid-compliance

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Solhint
        run: npm install -g solhint

      - name: Lint
        run: solhint 'src/**/*.sol'
